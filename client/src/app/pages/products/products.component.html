<!-- Products Page -->
<section class="min-h-screen bg-[rgb(var(--pal-beige))] pb-12">
  
  <!-- Minimalist Hero Section -->
  <div class="relative overflow-hidden bg-[rgb(var(--pal-deep))] py-12 mb-8 shadow-sm">
    <div class="absolute inset-0 opacity-10">
      <div class="absolute inset-0" style="background-image: radial-gradient(circle at 1px 1px, rgb(var(--pal-gold)) 1px, transparent 0); background-size: 30px 30px;"></div>
    </div>
    
    <div class="max-w-7xl mx-auto px-6 relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="text-left">
        <h1 class="text-2xl md:text-3xl font-bold text-[rgb(var(--pal-ivory))] mb-2 tracking-tight">
          The <span class="text-[rgb(var(--pal-gold))]">Collection</span>
        </h1>
        <p class="text-[rgb(var(--pal-ivory))] opacity-60 text-sm max-w-md">
          Curated timepieces for refined tastes.
        </p>
      </div>
      
      <!-- Compact Search Bar -->
      <div class="w-full md:w-80">
        <div class="relative group">
          <input type="text" placeholder="Find a product..." (input)="searchProducts($event)"
            class="w-full bg-white/5 border border-white/10 text-white px-5 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[rgb(var(--pal-gold))]/40 transition-all placeholder:text-white/20 backdrop-blur-sm text-sm">
          <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- Sidebar: Normally scrolled, top-aligned -->
      <aside class="w-full lg:w-72 flex-shrink-0 lg:ml-4 xl:ml-8 lg:mr-8 pt-8">
        <div class="w-full space-y-6">
          
          <!-- Filter Panel -->
          <div class="bg-white/30 rounded-2xl p-6 border border-white/20 shadow-sm">
            <h3 class="text-xs font-bold text-[rgb(var(--pal-deep))]/40 uppercase tracking-widest mb-4">
              Categories
            </h3>
            <div class="space-y-0.5">
              <button *ngFor="let cat of categories"
                (click)="filterByCategory(cat)"
                class="w-full text-left px-4 py-2 rounded-lg transition-all duration-200 text-sm"
                [ngClass]="selectedCategory === cat ? 'bg-[rgb(var(--pal-deep))] text-white' : 'text-[rgb(var(--pal-royal))] opacity-70 hover:bg-white'">
                <span class="capitalize">{{cat}}</span>
              </button>
            </div>

            <hr class="my-6 border-[rgb(var(--pal-deep))]/5">

            <h3 class="text-xs font-bold text-[rgb(var(--pal-deep))]/40 uppercase tracking-widest mb-4">
              Sort By
            </h3>
            <div class="space-y-1">
              <button (click)="sortProducts('featured')" 
                class="w-full text-left px-4 py-2 rounded-xl transition-all duration-200 text-sm"
                [ngClass]="sortBy === 'featured' ? 'bg-[rgb(var(--pal-gold))] text-white' : 'text-[rgb(var(--pal-royal))] opacity-70 hover:bg-white/50'">
                Featured
              </button>
              <button (click)="sortProducts('priceLow')" 
                class="w-full text-left px-4 py-2 rounded-xl transition-all duration-200 text-sm"
                [ngClass]="sortBy === 'priceLow' ? 'bg-[rgb(var(--pal-gold))] text-white' : 'text-[rgb(var(--pal-royal))] opacity-70 hover:bg-white/50'">
                Price: Low-High
              </button>
              <button (click)="sortProducts('priceHigh')" 
                class="w-full text-left px-4 py-2 rounded-xl transition-all duration-200 text-sm"
                [ngClass]="sortBy === 'priceHigh' ? 'bg-[rgb(var(--pal-gold))] text-white' : 'text-[rgb(var(--pal-royal))] opacity-70 hover:bg-white/50'">
                Price: High-Low
              </button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Grid Content -->
      <div class="flex-grow">
        <div class="flex items-center justify-between mb-6 opacity-40">
          <p class="text-xs font-medium uppercase tracking-widest">
            {{filteredProducts.length}} results found in {{selectedCategory}}
          </p>
        </div>

        <!-- Smaller Grid & Boxes -->
        <div *ngIf="filteredProducts.length" class="grid grid-cols-2 md:grid-cols-2 xl:grid-cols-3 gap-6">
          <div *ngFor="let product of filteredProducts; let i = index" 
            class="product-card-minimal animate-fade-in-up" [style.animation-delay]="(i * 0.05) + 's'">
            
            <div class="relative group rounded-xl bg-white border border-black/5 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300">
              <div class="aspect-square bg-slate-50 overflow-hidden">
                <img [src]="product.image" [alt]="product.pname"
                  class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
              </div>
              
              <!-- Subtle Action Button -->
              <div class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                <a [routerLink]="['/products', product.id]" 
                   class="bg-white/90 backdrop-blur-sm p-2 rounded-lg text-[rgb(var(--pal-deep))] shadow-sm border border-black/5 hover:bg-[rgb(var(--pal-gold))] hover:text-white transition-all">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </a>
              </div>

              <div class="p-4">
                <span class="text-[8px] font-bold uppercase tracking-[0.2em] text-[rgb(var(--pal-gold))] mb-1 block">{{product.category}}</span>
                <h3 class="text-sm font-bold text-[rgb(var(--pal-deep))] mb-1 truncate">
                  <a [routerLink]="['/products', product.id]">{{product.pname}}</a>
                </h3>
                <div class="flex items-center justify-between">
                  <p class="text-sm font-black text-[rgb(var(--pal-deep))]">₹{{product.price}}</p>
                  <div class="flex gap-0.5 scale-75 origin-right opacity-40">
                    <svg *ngFor="let i of [1,2,3,4,5]" class="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Simple Empty state -->
        <div *ngIf="!filteredProducts.length" class="text-center py-24 bg-white/20 rounded-2xl border border-dashed border-[rgb(var(--pal-deep))]/5">
          <p class="text-sm text-[rgb(var(--pal-deep))] opacity-40">No products match your criteria.</p>
        </div>
      </div>

    </div>
  </div>
</section>

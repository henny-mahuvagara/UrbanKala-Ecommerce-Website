<!-- Login Page -->
<section class="relative min-h-screen flex items-center justify-center overflow-hidden py-12 bg-[rgb(var(--pal-beige))]">
    <!-- Background blobs -->
    <div class="absolute w-[400px] h-[400px] bg-primary-500 rounded-full -top-24 -right-24 opacity-15 blur-[120px]">
    </div>
    <div class="absolute w-[300px] h-[300px] bg-secondary-500 rounded-full -bottom-24 -left-24 opacity-15 blur-[120px]">
    </div>

    <div class="w-full max-w-md mx-auto px-6 relative z-10">
        <div class="bg-[rgb(var(--pal-deep))] backdrop-blur-2xl border border-white/[0.08] rounded-3xl p-8 sm:p-10 shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="w-20 h-20 bg-gradient-to-br from-primary-500 to-secondary-600 rounded-full flex items-center justify-center mx-auto mb-5 text-3xl text-white shadow-lg shadow-primary-500/25">
                    <img src="images/login.png" alt="login icon" class="h-15 w-auto mb-1 object-contain">
                </div>
                <h2 class="text-2xl font-bold mb-1">Welcome Back!</h2>
                <p class="text-[rgb(var(--pal-ivory))]">Sign in to your account</p>
            </div>

            <!-- Error -->
            <div *ngIf="errorMessage"
                class="mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm text-center">
                {{ errorMessage }}
            </div>

            <!-- Form -->
            <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <input formControlName="email" type="email" id="email" placeholder="Enter your email"
                        class="w-full px-4 py-3 bg-card/80 border border-white/10 rounded-xl text-slate-100 placeholder-slate-500 text-sm focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input formControlName="password" type="password" id="password" placeholder="Enter your password"
                        class="w-full px-4 py-3 bg-card/80 border border-white/10 rounded-xl text-slate-100 placeholder-slate-500 text-sm focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 transition-all">
                </div>



                <button type="submit"
                    class="w-full py-3.5 bg-gradient-to-r from-primary-500 to-secondary-600 text-white font-semibold rounded-xl shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:-translate-y-0.5 transition-all duration-300 text-sm">
                    Sign In
                </button>

                <p class="text-center text-[rgb(var(--pal-ivory))] text-sm">
                    Don't have an account?
                    <a routerLink="/register"
                        class="text-primary-400 hover:text-primary-300 font-medium transition-colors">Sign Up</a>
                </p>
            </form>
        </div>
    </div>
</section>

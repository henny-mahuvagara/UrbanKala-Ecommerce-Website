<style>
    body {
        background: linear-gradient(135deg, #6c5ce7, #00b894);
        min-height: 100vh;
    }

    .login-card {
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
</style>

<div class="mt-5 d-flex align-items-center justify-content-center">

    <div style="width: 500px;">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle fs-1 text-primary"></i>
                <h3 class="mt-2">Login</h3>
                <p class="text-muted">Sign in to your account</p>
            </div>
            <div *ngIf="errorMessage" class="text-danger text-center mt-2">
                {{ errorMessage }}
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="login()">
                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" formControlName="email" class="form-control" placeholder="Enter email"
                            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    </div>
                    <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger small mt-1">
                        <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
                        <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email.</span>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" formControlName="password" class="form-control"
                            placeholder="Enter password" [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    </div>
                    <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger small mt-1">
                        <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
                        <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
                    </div>
                </div>
                <!-- Button -->
                <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
                    Login
                </button>

                <!-- <div class="text-center mt-3">
                    <small>Don't have an account?
                        <button class="btn btn-primary" type="button" routerLink="/register">Register</button>
                    </small>
                </div> -->
            </form>
        </div>
    </div>

</div>

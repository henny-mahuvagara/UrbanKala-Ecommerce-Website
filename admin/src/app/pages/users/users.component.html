<!-- Users Page -->
<div class="p-6">
    <h1 class="text-2xl font-bold mb-6 text-slate-800">
        Registered Users <span class="text-sm font-normal text-slate-500 bg-slate-100 px-3 py-1 rounded-full ml-2">{{
            users.length }}</span>
    </h1>

    <div class="bg-white border boundary-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-slate-600">
                <thead class="bg-slate-50 border-b border-slate-200 uppercase text-xs font-semibold text-slate-500">
                    <tr>
                        <th class="px-6 py-4">User ID</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Role</th>
                        <th class="px-6 py-4">Joined At</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr *ngFor="let user of users" class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-mono text-xs text-slate-400">{{ user.id }}</td>
                        <td class="px-6 py-4 font-medium text-slate-900">{{ user.email }}</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 rounded-full text-xs font-medium"
                                [class]="user.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700'">
                                {{ user.role || 'User' }}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-slate-500">{{ user.createdAt | date:'mediumDate' }}</td>
                        <td class="px-6 py-4 text-right">
                            <button
                                class="text-slate-400 hover:text-blue-600 font-medium transition-colors">View</button>
                        </td>
                    </tr>
                    <tr *ngIf="loading">
                        <td colspan="5" class="px-6 py-8 text-center text-slate-500">Loading users...</td>
                    </tr>
                    <tr *ngIf="!loading && users.length === 0">
                        <td colspan="5" class="px-6 py-8 text-center text-slate-500">No users found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

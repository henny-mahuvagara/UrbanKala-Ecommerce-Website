

<!-- Cart Page -->
<section class="py-16 min-h-[calc(100vh-72px)] bg-[rgb(var(--pal-beige))]">
    <div class="max-w-5xl mx-auto px-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold mb-2 text-[rgb(var(--pal-deep))]">
                    Your <span
                        class="text-[rgb(var(--pal-deep))] bg-clip-text">Cart</span>
                </h1>
                <p class="text-[rgb(var(--pal-deep))]">{{ cartItems.length }} item{{ cartItems.length !== 1 ? 's' : '' }} in your
                    cart</p>
            </div>
            <a routerLink="/products"
                class="px-5 py-2.5 border border-2 border-[rgb(var(--pal-deep))] text-[rgb(var(--pal-deep))] text-sm font-medium rounded-full hover:bg-white/5 hover:border-slate-600 transition-all">
                ← Continue Shopping
            </a>
        </div>

        <!-- Cart Items -->
        <div *ngIf="cartItems.length" class="space-y-4 mb-10">
            <div *ngFor="let item of cartItems"
                class="bg-[rgb(var(--pal-deep))] border border-[rgb(var(--pal-deep))] rounded-2xl p-5 flex flex-col sm:flex-row items-center gap-5 hover: transition-all duration-300">
                <!-- Image -->
                <div class="w-24 h-24 rounded-xl overflow-hidden bg-slate-800/50 shrink-0">
                    <img [src]="item.image" [alt]="item.pname" class="w-full h-full object-cover">
                </div>

                <!-- Details -->
                <div class="flex-grow text-center sm:text-left">
                    <h4 class="font-semibold text-lg capitalize">
                        <a [routerLink]="['/products', item.productId]"
                            class="hover:text-primary-400 transition-colors">{{ item.pname }}</a>
                    </h4>
                    <p *ngIf="item.pdesc" class="text-slate-400 text-sm mt-1 line-clamp-1">{{ item.pdesc }}</p>
                </div>

                <!-- Price -->
                <span class="text-xl font-bold text-primary-300 shrink-0">₹{{ item.price }}</span>

                <!-- Remove -->
                <button (click)="removeItem(item.id)"
                    class="px-4 py-2 text-sm font-medium border border-red-500/40 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition-all duration-300 shrink-0">
                    Remove
                </button>
            </div>
        </div>

        <!-- Total & Checkout Section -->
        <div *ngIf="cartItems.length"
            class="checkout-container bg-white rounded-3xl p-8 flex flex-col md:flex-row items-center justify-between gap-8 shadow-[0_20px_50px_rgba(62,7,3,0.05)] border border-[rgba(var(--pal-deep),0.05)]">
            <div class="text-center md:text-left">
                <p class="text-[rgb(var(--pal-deep))] opacity-60 text-sm font-medium uppercase tracking-wider mb-1">Total investment</p>
                <h3 class="text-4xl font-bold text-[rgb(var(--pal-deep))] flex items-baseline gap-1">
                    <span class="text-2xl font-medium opacity-80">₹</span>{{ totalPrice }}
                </h3>
            </div>
            
            <button routerLink="/checkout"
                class="checkout-btn group relative px-10 py-4 bg-[rgb(var(--pal-deep))] text-[rgb(var(--pal-beige))] font-bold rounded-2xl overflow-hidden transition-all duration-500 hover:shadow-[0_15px_30px_rgba(62,7,3,0.3)] active:scale-95">
                <span class="relative z-10 flex items-center gap-3">
                    Proceed to Checkout
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform duration-500 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </span>
                <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
            </button>
        </div>

        <!-- Empty State --> 
        <div *ngIf="!cartItems.length" class="text-center py-24">
            <!-- <p class="text-5xl mb-5">🛒</p> -->
            <img src="/images/cart.png" class="mx-auto w-20 h-20 object-contain">

            <h3 class="text-xl text-[rgb(var(--pal-deep))] font-semibold mb-2">Your cart is empty</h3>
            <p class="text-[rgb(var(--pal-deep))] mb-6">Looks like you haven't added anything yet.</p>
            <a routerLink="/products"
                class="inline-block px-7 py-3.5 text-[rgb(var(--pal-beige))] bg-[rgb(var(--pal-deep))] font-semibold rounded-full shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:-translate-y-0.5 transition-all duration-300">
                Browse Products
            </a>
        </div>
    </div>
</section>

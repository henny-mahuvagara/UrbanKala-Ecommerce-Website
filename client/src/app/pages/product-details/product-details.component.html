<!-- Product Details Page -->
<section class="py-16 bg-[rgb(var(--pal-beige))]" *ngIf="product">
  <div class="max-w-5xl mx-auto px-6">
    <!-- Back Link -->
    <a routerLink="/products"
      class="inline-flex items-center gap-2 text-[rgb(var(--pal-deep))] hover: transition-colors text-sm font-medium mb-8 group">
      <span class="text-[rgb(var(--pal-deep))] group-hover:-translate-x-1 transition-transform">←</span> Back to
      Products
    </a>

    <!-- Product Card -->
    <div class="bg-[rgb(var(--pal-deep))] border border-white/[0.07] rounded-3xl overflow-hidden shadow-2xl">
      <div class="grid md:grid-cols-2">
        <!-- Image -->
        <!-- <div class="h-72 md:h-auto bg-slate-800/50 flex items-center justify-center p-8"> -->
        <div class="h-72 md:h-auto flex items-center justify-center p-4">
          <img [src]="product.image" [alt]="product.pname" class="max-h-80 object-contain rounded-xl">
        </div>

        <!-- Details -->
        <div class="p-8 md:p-10 flex flex-col text-[rgb(var(--pal-ivory))]">
          <h1 class="text-2xl sm:text-3xl font-bold capitalize mb-4">{{product.pname}}</h1>

          <div class="flex items-center gap-3 mb-6">
            <span class="text-3xl font-bold bg-clip-text text-[rgb(var(--pal-ivory))]">₹{{product.price}}</span>
            <span class="px-3 py-1 text-xs font-medium border border-[rgb(var(--pal-ivory))] rounded-full">In
              Stock</span>
          </div>

          <!-- Quantity Selector -->
          <!-- <div class="flex items-center gap-4 mb-6"> -->
          <!-- <span class="text-sm font-medium">Quantity:</span>

            <div class="flex items-center border border-[rgb(var(--pal-ivory))] rounded-lg overflow-hidden">

              <button (click)="decreaseQty()" class="px-3 py-1 hover:bg-white/10 transition">−</button>

              <span class="px-4">{{ quantity }}</span>

              <button (click)="increaseQty()" class="px-3 py-1 hover:bg-white/10 transition">+</button>

            </div> -->
          <!-- </div> -->    

                   
          <div class="flex flex-wrap gap-3 mt-auto">
            <!-- Add to Cart button -->
            <button *ngIf="!alreadyInCart" (click)="addToCart()" [disabled]="addingToCart || addedToCart"
              [class]="addedToCart
                ? 'flex-1 min-w-[160px] py-3.5 bg-secondary-600 text-white font-semibold rounded-xl text-sm cursor-default'
                : 'flex-1 min-w-[160px] py-3.5 bg-[rgb(var(--pal-beige))] text-[rgb(var(--pal-deep))] font-semibold rounded-xl shadow-lg shadow-primary-500/25 hover:shadow-primary-500/40 hover:-translate-y-0.5 transition-all duration-300 text-sm disabled:opacity-50'">
              <span *ngIf="!addingToCart && !addedToCart">Add To Cart</span>
              <span *ngIf="addingToCart">Adding...</span>
              <span *ngIf="addedToCart">✓ Added to Cart</span>
            </button>
            <!-- Already in cart -->
            <a *ngIf="alreadyInCart" routerLink="/cart"
              class="flex-1 min-w-[160px] py-3.5 bg-[rgb(var(--pal-beige))] text-[rgb(var(--pal-deep))] font-semibold rounded-xl text-sm text-center hover:bg-white/5 hover:text-[rgb(var(--pal-ivory))] hover:border-slate-500 transition-all duration-300">
              ✓ Already in Cart — View Cart
            </a>
            <!-- Buy Now Button -->
            <button (click)="buyNow()" [disabled]="addingToCart"
              class="flex-1 min-w-[160px] py-3.5 bg-[rgb(var(--pal-beige))] text-[rgb(var(--pal-deep))] font-bold rounded-xl hover:border-1 hover:bg-white/5 hover:text-[rgb(var(--pal-ivory))] hover:border-slate-500 transition-all duration-300 text-sm shadow-lg shadow-white/5">
              Buy Now
            </button>
            <button (click)="goBack()"
              class="flex-1 min-w-[120px] py-3.5 border border-[rgb(var(--pal-ivory))]  font-semibold rounded-xl hover:bg-white/5 hover:border-[rgb(var(--pal-ivory))] transition-all duration-300 text-sm">
              Go Back
            </button>
          </div>
          
          <div class="mt-6 space-y-3">

            <!-- SECTION 1 -->
            <div class="border border-white/10 rounded-xl overflow-hidden">

              <div class="flex justify-between items-center px-4 py-3 cursor-pointer hover:bg-white/5 transition"
                (click)="toggleSection('desc')">

                <p class="text-[rgb(var(--pal-ivory))] font-medium">
                  Product Details
                </p>

                <span class="arrow" [class.rotate]="activeSection === 'desc'">
                  ▼
                </span>

              </div>

              <div class="accordion-content" [class.open]="activeSection === 'desc'">

                <p class="p-4 text-[rgb(var(--pal-ivory))]">
                  {{product.pdesc || 'A premium quality product from UrbanKala. Crafted with care and designed for perfection.'}}
                </p>

              </div>
            </div>


            <!-- SECTION 2 -->
              <!--<div class="border border-white/10 rounded-xl overflow-hidden">

                <div class="flex justify-between items-center px-4 py-3 cursor-pointer hover:bg-white/5 transition"
                  (click)="toggleSection('craft')">

                  <p class="text-[rgb(var(--pal-ivory))] font-medium">
                    About the Craft
                  </p>

                  <span class="arrow" [class.rotate]="activeSection === 'craft'">
                    ▼
                  </span>

                </div>

                <div class="accordion-content" [class.open]="activeSection === 'craft'">

                  <p class="p-4 text-[rgb(var(--pal-ivory))]">
                    {{product.about || 'Handcrafted by skilled artisans using traditional techniques.'}}
                  </p>

                </div>
              </div> -->


            <!-- SECTION 3 -->
            <div class="border border-white/10 rounded-xl overflow-hidden">

              <div class="flex justify-between items-center px-4 py-3 cursor-pointer hover:bg-white/5 transition"
                (click)="toggleSection('care')">

                <p class="text-[rgb(var(--pal-ivory))] font-medium">
                  Care Instructions
                </p>

                <span class="arrow" [class.rotate]="activeSection === 'care'">
                  ▼
                </span>

              </div>

              <div class="accordion-content" [class.open]="activeSection === 'care'">

                <p class="p-4 text-[rgb(var(--pal-ivory))]">
                  <!-- {{product.care || 'Keep away from water, perfume, and store in a dry place.'}} -->
                  {{product.care}}

                </p>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
